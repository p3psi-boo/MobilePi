name: mobilepi_client
description: MobilePi 指挥官移动端客户端 - 多机 Coding Agent 调度看板
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.4
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  json_annotation: ^4.9.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  flutter_svg: ^2.0.0
  uuid: ^4.4.0
  logging: ^1.2.0

  # 共享协议与模型
  mobilepi_shared:
    path: ../shared
  font_awesome_flutter: ^11.0.0
  gpt_markdown: ^1.1.7
  drift: ^2.19.1+1
  path: ^1.9.1
  sqlite3: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  drift_dev: ^2.19.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

